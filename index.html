<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Voz Seguro</title>

<style>
body { background:#111; color:white; text-align:center; font-family:Arial; }
#piano { display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
.key {
  width:34px; height:150px; margin:1px;
  background:white; color:black; font-size:9px;
  display:flex; align-items:flex-end; justify-content:center;
}
.active { background:#00ffcc !important; }
button { padding:10px 20px; font-size:16px; margin-top:20px; }
</style>
</head>

<body>

<h1>Piano con Voz (sin errores absurdos)</h1>
<button onclick="start()">Iniciar</button>

<div id="status">Estado: esperando</div>
<div id="noteDisplay">Nota: -</div>

<div id="piano"></div>

<!-- IMPORTANTE -->
<script src="https://cdn.jsdelivr.net/npm/pitchy@2.0.3/dist/pitchy.min.js"></script>

<script>
let audioContext, analyser, detector;
let osc, gainNode;
let lastNote = "";

const notes = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];

// 🎹 crear piano
(function(){
  let piano=document.getElementById("piano");
  for(let o=2;o<=5;o++){
    for(let n of notes){
      let key=document.createElement("div");
      key.className="key";
      key.id=n+o;
      key.innerText=n+o;
      piano.appendChild(key);
    }
  }
})();

async function start(){
  const status = document.getElementById("status");

  // 🔥 validar librería
  if (typeof Pitchy === "undefined") {
    status.innerText = "❌ Error: Pitchy no cargó (internet/CDN)";
    console.error("Pitchy no está disponible");
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();

    const input = audioContext.createMediaStreamSource(stream);

    analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;

    input.connect(analyser);

    detector = Pitchy.PitchDetector.forFloat32Array(analyser.fftSize);

    // 🔊 sonido
    osc = audioContext.createOscillator();
    gainNode = audioContext.createGain();

    osc.type = "triangle";
    gainNode.gain.value = 0;

    osc.connect(gainNode);
    gainNode.connect(audioContext.destination);
    osc.start();

    status.innerText = "🎤 Detectando voz...";
    detect();

  } catch(e){
    console.error(e);
    status.innerText = "❌ Error de micrófono";
  }
}

function detect(){
  const buffer = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(buffer);

  const [pitch, clarity] = detector.findPitch(buffer, audioContext.sampleRate);

  if(clarity > 0.8 && pitch > 80 && pitch < 1000){
    let note = freqToNote(pitch);

    if(note !== lastNote){
      highlight(note);
      document.getElementById("noteDisplay").innerText =
        "Nota: " + note;
      lastNote = note;
    }

    osc.frequency.setValueAtTime(pitch, audioContext.currentTime);
    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);

  } else {
    gainNode.gain.setValueAtTime(0, audioContext.currentTime);
  }

  requestAnimationFrame(detect);
}

function freqToNote(freq){
  const A4 = 440;
  let n = 12 * Math.log2(freq / A4);
  let i = Math.round(n) + 57;

  let octave = Math.floor(i / 12);
  let name = notes[i % 12];

  return name + octave;
}

function highlight(note){
  document.querySelectorAll(".key").forEach(k=>k.classList.remove("active"));
  let el=document.getElementById(note);
  if(el) el.classList.add("active");
}
</script>

</body>
</html>
